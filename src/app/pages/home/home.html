<div class="app-background">

  <header class="navbar" [class.navbar-hidden]="isNavbarHidden">
    
    <div class="brand" (click)="scrollToTop()">
      <span class="logo-box">A</span>
      <span class="brand-text">nimeHub</span>
    </div>

    <nav class="nav-links">
      <button class="nav-btn active-nav" (click)="scrollToTop()">
        <i class="fas fa-home"></i> Home
      </button>

      <span class="user-greeting">
        Welcome, <span class="highlight-name">{{ username }}</span>!
      </span>

      <div class="hamburger-container">
        
        <i class="fas fa-bars hamburger-icon" (click)="toggleMenu()"></i>

        <div class="dropdown-menu" *ngIf="isMenuOpen">
          
          <button class="dropdown-item" [routerLink]="['/contact']" (click)="toggleMenu()">
            <i class="fas fa-comment-dots"></i> Contact
          </button>
          <button class="dropdown-item" [routerLink]="['/about']" (click)="toggleMenu()">
            <i class="fas fa-info-circle"></i> About
          </button>
          
          <div class="dropdown-divider"></div>
          
          <button class="dropdown-item logout-text" (click)="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>

        </div>
      </div>

    </nav>
  </header>

  <main class="hero-section">
    <div class="hero-content">
      <h1>Your Ultimate Anime<br>Universe Awaits.</h1>
      <p>The ultimate visual hub for anime <br> enthusiasts everywhere.</p>

      <div class="cta-buttons">
        <button class="btn-explore" [routerLink]="['/gallery']">BROWSE GALLERY</button>
        <button class="btn-start" [routerLink]="['/seasonal']">TRENDING NOW</button>
      </div>
    </div>

    <div class="hero-graphics">
      <div class="slideshow-container">
        <div class="slide-track" [style.transform]="'translateX(-' + (currentImageIndex * 100) + '%)'">
          <img *ngFor="let img of animeImages" [src]="img" alt="Trending Anime" class="slideshow-image">
        </div>

        <button class="slide-btn prev" (click)="prevSlide()">&lt;</button>
        <button class="slide-btn next" (click)="nextSlide()">&gt;</button>
      </div>

    </div>
  </main>
  
</div>
