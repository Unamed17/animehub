<div class="app-background">

<app-header></app-header>

  <main class="hero-section">
    <div class="hero-content">
      <h1>Your Ultimate Anime<br>Universe Awaits.</h1>
      <p>The ultimate visual hub for anime <br> enthusiasts everywhere.</p>

      <div class="cta-buttons">
        <button class="btn-explore" [routerLink]="['/gallery']">BROWSE GALLERY</button>
        <button class="btn-start" [routerLink]="['/seasonal']">TRENDING NOW</button>
      </div>
    </div>

    <div class="hero-graphics">
      <div class="slideshow-container">
        <div class="slide-track" [style.transform]="'translateX(-' + (currentImageIndex * 100) + '%)'">
          <img *ngFor="let img of animeImages" [src]="img" alt="Trending Anime" class="slideshow-image">
        </div>

        <button class="slide-btn prev" (click)="prevSlide()">&lt;</button>
        <button class="slide-btn next" (click)="nextSlide()">&gt;</button>
      </div>

    </div>
  </main>
</div>
<app-footer></app-footer>
