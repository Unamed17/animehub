<div class="seasonal-wrapper">
  
  <header class="navbar" [class.navbar-hidden]="isNavbarHidden">
  
  <div class="nav-brand">
    <div class="logo-box">A</div>
    <span class="brand-text">nimeHub</span>
  </div>

  <div class="nav-links">
    <button class="nav-btn active" (click)="goHome()">Home</button>

    <button class="nav-btn outline" (click)="goContact()">Contact</button>

    <button class="nav-btn outline" (click)="goAbout()">About</button>

  </div>

  </header>

  <div class="page-header">
    <h1 class="clean-title">Top Anime This Season</h1>
    <p class="subtitle">The hottest shows currently airing across the globe.</p>
  </div>

  <div *ngIf="isLoading" class="loading-state">
    <i class="fas fa-spinner fa-spin"></i> Loading live data...
  </div>

  <div class="anime-grid" *ngIf="!isLoading">
    
    <div class="anime-card" *ngFor="let anime of seasonalList; let i = index">
      
      <div class="card-image-wrapper">
        
        <div class="rank-badge">#{{ i + 1 }}</div>

        <img [src]="anime.images.jpg.large_image_url" [alt]="anime.title" class="anime-poster">
        
        <div class="score-badge" *ngIf="anime.score">
          <i class="fas fa-star"></i> {{ anime.score }}
        </div>
      </div>

      <div class="card-content">
        <h3>{{ anime.title_english || anime.title }}</h3>
        <button class="btn-view">View Details</button>
      </div>

    </div>

  </div>
</div>
