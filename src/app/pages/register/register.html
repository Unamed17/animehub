<div class="auth-wrapper">
  
  <button class="back-btn" (click)="goHome()">Back to Home</button>

  <div class="auth-card">
    
    <div class="logo-container">
  <span class="logo-box">A</span>
  <span class="logo-text">nimeHub</span>
</div>

    <h2>Create an Account</h2>
    <p class="subtitle">Join the universe and track your favorites.</p>

    <form (ngSubmit)="onRegister()">
      
      <p class="error-text" *ngIf="errorMessage">{{ errorMessage }}</p>

      <div class="input-group">
        <input type="text" placeholder="Username" name="username" [(ngModel)]="userName" required>
      </div>

      <div class="input-group">
        <input type="email" placeholder="Email Address" name="email" [(ngModel)]="userEmail" required>
      </div>

      <div class="input-group">
        <input type="password" placeholder="Password" name="password" [(ngModel)]="userPassword" required>
      </div>

      <div class="input-group">
        <input type="password" placeholder="Confirm Password" name="confirmPassword" [(ngModel)]="confirmPassword" required>
      </div>

      <div class="form-options">
  <label class="terms-label">
    <input type="checkbox" required>
    I agree to the <a routerLink="/terms" class="terms-link">Terms & Conditions</a>
  </label>
</div>

      <button type="submit" class="btn-submit">SIGN UP</button>

    </form>

    <div class="switch-prompt">
      Already have an account? <span class="highlight-link-cyan" [routerLink]="['/login']">Log in here</span>
    </div>

  </div>
</div>
